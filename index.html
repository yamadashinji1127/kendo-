<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>カレンダー</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --green: #4CAF50; --green-light: #e8f5e9;
      --red: #e53935; --blue: #1e88e5;
      --border: #ebebeb; --bg: #f7f8fa;
      --text: #1a1a1a; --sub: #888;
      --white: #fff; --radius: 16px;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--bg); color: var(--text);
      overscroll-behavior: none;
    }

    /* === HEADER === */
    .app-header {
      background: var(--white); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50; padding: 0 16px;
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between; height: 56px;
    }
    .app-logo { font-size: 20px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }
    .header-controls { display: flex; align-items: center; gap: 4px; }
    .nav-btn {
      background: none; border: none; width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--sub); font-size: 20px; transition: background 0.15s;
    }
    .nav-btn:hover { background: var(--bg); }
    .nav-btn:active { background: var(--border); }
    .today-btn {
      background: none; border: 1.5px solid var(--green); color: var(--green);
      padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .today-btn:hover { background: var(--green-light); }
    .month-title {
      font-size: 19px; font-weight: 700; color: var(--text);
      min-width: 120px; text-align: center;
    }

    /* === CALENDAR === */
    .calendar-wrap {
      background: var(--white); margin: 12px 8px;
      border-radius: var(--radius); box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden;
    }
    .weekdays { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
    .weekday {
      text-align: center; padding: 10px 0 8px;
      font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: 0.5px;
    }
    .weekday.wd-sun { color: var(--red); }
    .weekday.wd-sat { color: var(--blue); }
    .days-grid { display: grid; grid-template-columns: repeat(7,1fr); }
    .day-cell {
      border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
      min-height: 82px; padding: 4px 3px 3px; cursor: pointer;
      transition: background 0.12s; position: relative; overflow: hidden;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell:hover { background: #f9fafb; }
    .day-cell:active { background: #f0f0f0; }
    .day-cell.other-month { background: #fafafa; }
    .day-num {
      width: 28px; height: 28px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; font-size: 13px;
      font-weight: 500; margin-bottom: 2px; transition: all 0.15s;
    }
    .day-cell.other-month .day-num { color: #ccc; }
    .day-cell.is-sunday .day-num  { color: var(--red); }
    .day-cell.is-saturday .day-num { color: var(--blue); }
    .day-cell.is-holiday .day-num  { color: var(--red); }
    .day-cell.is-today .day-num { background: var(--green); color: #fff !important; font-weight: 700; }
    .holiday-name {
      font-size: 9px; color: var(--red); line-height: 1.1;
      padding: 0 2px; margin-bottom: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-chip {
      display: block; font-size: 10px; line-height: 1.5; padding: 1px 5px;
      border-radius: 4px; margin-bottom: 2px; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 500; cursor: pointer; transition: opacity 0.12s;
    }
    .event-chip:hover { opacity: 0.85; }
    .more-badge { font-size: 10px; color: var(--sub); padding-left: 4px; font-weight: 500; }

    /* === OVERLAY === */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }
    @media (min-width: 560px) {
      .overlay { align-items: center; }
      .sheet { border-radius: var(--radius) !important; max-width: 480px; margin: 0 auto; }
    }

    /* === SHEET === */
    .sheet {
      background: var(--white); width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 16px);
      animation: slideUp 0.28s cubic-bezier(0.34, 1.1, 0.64, 1);
      max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    @keyframes slideUp {
      from { transform: translateY(110%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 0; }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--white); z-index: 1;
    }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .sheet-close {
      background: #f0f0f0; border: none; width: 30px; height: 30px;
      border-radius: 50%; font-size: 18px; color: var(--sub); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .sheet-close:hover { background: #e0e0e0; }
    .sheet-body { padding: 16px 20px; }

    /* === DAY SHEET === */
    .day-date-label { font-size: 15px; font-weight: 600; }
    .day-holiday-label { font-size: 13px; color: var(--red); font-weight: 500; }
    .event-list-item {
      display: flex; align-items: center; padding: 12px 14px;
      border-radius: 12px; margin-bottom: 8px; background: #f7f8fa;
      cursor: pointer; gap: 10px; transition: background 0.12s;
    }
    .event-list-item:hover { background: #f0f2f5; }
    .event-list-item:active { background: #e8eaed; }
    .event-color-bar { width: 4px; height: 40px; border-radius: 2px; flex-shrink: 0; }
    .event-list-info { flex: 1; min-width: 0; }
    .event-list-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-list-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .event-attach-badge {
      font-size: 11px; color: var(--sub); display: flex; align-items: center; gap: 3px; margin-top: 3px;
    }
    .event-edit-btn {
      background: none; border: none; color: var(--green);
      font-size: 13px; font-weight: 600; cursor: pointer;
      padding: 4px 8px; border-radius: 8px; flex-shrink: 0;
    }
    .event-edit-btn:hover { background: var(--green-light); }
    .add-event-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 13px; border: 2px dashed #d4d4d4; border-radius: 12px;
      background: none; color: var(--green); font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px; transition: all 0.15s;
    }
    .add-event-btn:hover { border-color: var(--green); background: var(--green-light); }
    .empty-label { text-align: center; color: var(--sub); font-size: 14px; padding: 16px 0 8px; }

    /* === EVENT DETAIL SHEET === */
    .detail-header-row {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
    }
    .detail-color-bar { width: 5px; border-radius: 3px; flex-shrink: 0; align-self: stretch; min-height: 40px; }
    .detail-title { font-size: 20px; font-weight: 700; line-height: 1.3; flex: 1; }
    .detail-meta-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; color: var(--sub); font-size: 14px; }
    .detail-meta-icon { font-size: 15px; }
    .detail-note { font-size: 14px; color: var(--sub); margin-bottom: 16px; white-space: pre-wrap; word-break: break-all; }
    .detail-section-label {
      font-size: 11px; font-weight: 700; color: var(--sub); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 10px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* image grid */
    .img-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 16px; }
    .img-thumb {
      aspect-ratio: 1; border-radius: 10px; object-fit: cover;
      width: 100%; cursor: pointer; transition: opacity 0.15s;
      background: #eee;
    }
    .img-thumb:hover { opacity: 0.85; }

    /* file list */
    .file-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px;
      border-radius: 10px; background: #f7f8fa; margin-bottom: 8px;
      cursor: pointer; transition: background 0.12s; text-decoration: none; color: var(--text);
    }
    .file-item:hover { background: #eef0f3; }
    .file-icon { font-size: 24px; flex-shrink: 0; }
    .file-name { flex: 1; font-size: 14px; word-break: break-all; }
    .file-size { font-size: 12px; color: var(--sub); flex-shrink: 0; }

    /* edit button in detail */
    .detail-edit-btn {
      width: 100%; padding: 14px; background: var(--green); color: #fff;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px; font-family: inherit; transition: opacity 0.15s;
    }
    .detail-edit-btn:active { opacity: 0.85; }

    /* === FORM === */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700; color: var(--sub);
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 13px 14px; border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 16px; color: var(--text); background: var(--white);
      outline: none; transition: border-color 0.2s; font-family: inherit; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--green); }
    .form-input::placeholder { color: #bbb; }
    .color-grid { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-swatch {
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; position: relative;
    }
    .color-swatch.active { border-color: #222; transform: scale(1.15); }
    .color-swatch.active::after {
      content: ''; position: absolute; inset: 3px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
    }

    /* attach buttons */
    .attach-row { display: flex; gap: 10px; }
    .attach-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 14px 8px;
      border: 1.5px dashed #d4d4d4; border-radius: 12px; background: none;
      color: var(--sub); font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .attach-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
    .attach-btn-icon { font-size: 24px; }

    /* pending attachments preview */
    .pending-images { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 10px; }
    .pending-img-wrap { position: relative; aspect-ratio: 1; }
    .pending-img {
      width: 100%; height: 100%; object-fit: cover;
      border-radius: 8px; display: block; background: #eee;
    }
    .pending-remove {
      position: absolute; top: 3px; right: 3px; width: 22px; height: 22px;
      border-radius: 50%; background: rgba(0,0,0,0.55); color: #fff;
      border: none; font-size: 14px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; line-height: 1;
    }
    .pending-files { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .pending-file {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: #f7f8fa; border-radius: 8px; font-size: 13px;
    }
    .pending-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pending-file-remove {
      background: none; border: none; color: var(--red); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1; flex-shrink: 0;
    }

    .btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; font-family: inherit;
    }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    .btn-save { background: var(--green); color: #fff; }
    .btn-delete { background: #fff; color: var(--red); border: 1.5px solid #ffcdd2; }
    .btn-delete:hover { background: #fff5f5; }

    /* === LIGHTBOX === */
    #lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 500; align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightboxImg { max-width: 96vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    #lightboxClose {
      position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.15);
      border: none; color: #fff; width: 38px; height: 38px; border-radius: 50%;
      font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* === SPINNER === */
    .spinner-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 24px; color: var(--sub); font-size: 14px; gap: 8px;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid #ddd;
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === RESPONSIVE === */
    @media (min-width: 600px) {
      .day-cell { min-height: 100px; }
      .day-num { font-size: 14px; }
      .event-chip { font-size: 11px; }
      .calendar-wrap { margin: 16px 16px; }
      .img-grid { grid-template-columns: repeat(4,1fr); }
    }
    @media (min-width: 900px) {
      .day-cell { min-height: 120px; }
      .app-header { padding: 0 24px; }
      .calendar-wrap { margin: 20px 24px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <div class="app-logo">Calendar</div>
    <div class="header-controls">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
      <button class="today-btn" id="todayBtn">今日</button>
    </div>
  </div>
</header>

<!-- CALENDAR -->
<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday wd-sun">日</div>
    <div class="weekday">月</div>
    <div class="weekday">火</div>
    <div class="weekday">水</div>
    <div class="weekday">木</div>
    <div class="weekday">金</div>
    <div class="weekday wd-sat">土</div>
  </div>
  <div class="days-grid" id="daysGrid"></div>
</div>

<!-- DAY SHEET -->
<div class="overlay" id="dayOverlay">
  <div class="sheet" id="daySheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="day-date-label" id="dayDateLabel"></div>
        <div class="day-holiday-label" id="dayHolidayLabel"></div>
      </div>
      <button class="sheet-close" id="daySheetClose">&#215;</button>
    </div>
    <div class="sheet-body">
      <div id="dayEventList"></div>
      <button class="add-event-btn" id="addEventBtn">
        <span style="font-size:18px">+</span> 予定を追加
      </button>
    </div>
  </div>
</div>

<!-- EVENT DETAIL SHEET -->
<div class="overlay" id="detailOverlay">
  <div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="detailSheetDate"></div>
      <button class="sheet-close" id="detailSheetClose">&#215;</button>
    </div>
    <div class="sheet-body" id="detailBody"></div>
  </div>
</div>

<!-- EVENT FORM SHEET -->
<div class="overlay" id="eventOverlay">
  <div class="sheet" id="eventSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="eventSheetTitle">予定を追加</div>
      <button class="sheet-close" id="eventSheetClose">&#215;</button>
    </div>
    <div class="sheet-body">
      <div class="form-group">
        <label class="form-label" for="fTitle">タイトル</label>
        <input class="form-input" id="fTitle" type="text" placeholder="例：打ち合わせ" autocomplete="off" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label" for="fTime">時間（任意）</label>
        <input class="form-input" id="fTime" type="time">
      </div>
      <div class="form-group">
        <label class="form-label" for="fNote">メモ（任意）</label>
        <input class="form-input" id="fNote" type="text" placeholder="メモを入力" autocomplete="off" maxlength="200">
      </div>
      <div class="form-group">
        <label class="form-label">カラー</label>
        <div class="color-grid" id="colorGrid"></div>
      </div>
      <div class="form-group">
        <label class="form-label">添付</label>
        <div class="attach-row">
          <button class="attach-btn" id="addImageBtn" type="button">
            <span class="attach-btn-icon">🖼️</span>
            <span>画像を追加</span>
          </button>
          <button class="attach-btn" id="addFileBtn" type="button">
            <span class="attach-btn-icon">📎</span>
            <span>ファイルを追加</span>
          </button>
        </div>
        <div class="pending-images" id="pendingImages"></div>
        <div class="pending-files" id="pendingFiles"></div>
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        <input type="file" id="fileInput" multiple style="display:none">
      </div>
      <div class="btn-row">
        <button class="btn btn-save" id="saveBtn">保存する</button>
        <button class="btn btn-delete" id="deleteBtn" style="display:none">この予定を削除</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightboxClose">&#215;</button>
  <img id="lightboxImg" src="" alt="">
</div>

// =====================================================================
// INDEXEDDB
// =====================================================================
const DB_NAME = 'CalendarDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('events')) {
        d.createObjectStore('events', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('attachments')) {
        const as = d.createObjectStore('attachments', { keyPath: 'id' });
        as.createIndex('eventId', 'eventId', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function idbGetAll(storeName, indexName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = indexName ? store.index(indexName).getAll(key) : store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function idbPut(storeName, obj) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).put(obj);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function idbDelete(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

function idbGet(storeName, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

// =====================================================================
let currentDate   = new Date();
let selectedDate  = null;
let editingId     = null;
let selectedColor = COLORS[0];
// eventsMap: { [dateKey]: EventMeta[] }  (loaded from IDB, no blobs)
let eventsMap = {};

// Pending attachments while form is open
// { tempId, file, kind:'image'|'file', previewUrl? }
let pendingAdd    = [];

let pendingRemove = [];
// Existing attachments loaded for the editing event

// =====================================================================
// UTILS
// =====================================================================
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function getHoliday(d) { return HOLIDAYS[dateKey(d)] || null; }
function formatDayLabel(d) {
  return `${d.getMonth()+1}月${d.getDate()}日（${DOW_JP[d.getDay()]}）`;
}
function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  return (n/(1024*1024)).toFixed(1) + ' MB';
}
function uid() { return `${Date.now()}-${Math.random().toString(36).slice(2)}`; }
function fileExt(name) { return (name.match(/\.([^.]+)$/) || ['',''])[1].toUpperCase(); }
function fileIcon(mime='', name='') {
  if (mime.startsWith('image/')) return '🖼️';
  if (mime.includes('pdf')) return '📄';
  if (mime.includes('word') || name.endsWith('.docx') || name.endsWith('.doc')) return '📝';
  if (mime.includes('excel') || name.endsWith('.xlsx') || name.endsWith('.xls')) return '📊';
  if (mime.includes('zip') || mime.includes('compressed')) return '🗜️';
  if (mime.startsWith('video/')) return '🎬';
  if (mime.startsWith('audio/')) return '🎵';
  return '📎';
}

// =====================================================================
// LOAD ALL EVENTS FROM IDB
// =====================================================================
async function loadEventsMap() {
  const all = await idbGetAll('events');
  eventsMap = {};
  all.forEach(ev => {
    if (!eventsMap[ev.dateKey]) eventsMap[ev.dateKey] = [];
    eventsMap[ev.dateKey].push(ev);
  });
  // sort each day
  Object.keys(eventsMap).forEach(k => {
    eventsMap[k].sort((a, b) => {
      if (!a.time && !b.time) return 0;
      if (!a.time) return 1;
      if (!b.time) return -1;
      return a.time.localeCompare(b.time);
    });
  });
}

// =====================================================================
// CALENDAR RENDER
// =====================================================================
function renderCalendar() {
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${year}年${month+1}月`;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';

  const firstDow    = new Date(year, month, 1).getDay();
  const lastDate    = new Date(year, month+1, 0).getDate();
  const prevLast    = new Date(year, month, 0).getDate();

  for (let i = 0; i < 42; i++) {
    let d, isCurrent = true;
    if (i < firstDow) {
      d = new Date(year, month-1, prevLast - firstDow + i + 1);
      isCurrent = false;
    } else if (i - firstDow < lastDate) {
      d = new Date(year, month, i - firstDow + 1);
    } else {
      d = new Date(year, month+1, i - firstDow - lastDate + 1);
      isCurrent = false;
    }

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (!isCurrent) cell.classList.add('other-month');
    if (isToday(d))  cell.classList.add('is-today');

    const dow = d.getDay();
    const holiday = getHoliday(d);
    if (dow === 0 || holiday) cell.classList.add('is-sunday','is-holiday');
    else if (dow === 6) cell.classList.add('is-saturday');

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d.getDate();
    cell.appendChild(numEl);

    if (holiday && isCurrent) {
      const hEl = document.createElement('div');
      hEl.className = 'holiday-name';
      hEl.textContent = holiday;
      cell.appendChild(hEl);
    }

    const key = dateKey(d);
    const dayEvs = eventsMap[key] || [];
    dayEvs.slice(0, 3).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip';
      chip.style.background = ev.color || COLORS[0];
      chip.textContent = (ev.time ? ev.time + ' ' : '') + ev.title;
      chip.addEventListener('click', e => { e.stopPropagation(); openDaySheet(d); });
      cell.appendChild(chip);
    });

    if (dayEvs.length > 3) {
      const more = document.createElement('div');
      more.className = 'more-badge';
      more.textContent = `+${dayEvs.length - 3}件`;
      cell.appendChild(more);
    }

    cell.addEventListener('click', () => openDaySheet(d));
    grid.appendChild(cell);
  }
}

// =====================================================================
// DAY SHEET
// =====================================================================
function openDaySheet(d) {
  selectedDate = d;
  const key     = dateKey(d);
  const dayEvs  = eventsMap[key] || [];
  const holiday = getHoliday(d);

  document.getElementById('dayDateLabel').textContent = formatDayLabel(d);
  const hl = document.getElementById('dayHolidayLabel');
  hl.textContent = holiday || '';
  hl.style.display = holiday ? 'block' : 'none';

  const list = document.getElementById('dayEventList');
  list.innerHTML = '';

  if (dayEvs.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-label';
    empty.textContent = '予定はありません';
    list.appendChild(empty);
  }

  dayEvs.forEach(ev => {
    const item = document.createElement('div');
    item.className = 'event-list-item';

    const bar = document.createElement('div');
    bar.className = 'event-color-bar';
    bar.style.background = ev.color || COLORS[0];

    const info = document.createElement('div');
    info.className = 'event-list-info';

    const titleEl = document.createElement('div');
    titleEl.className = 'event-list-title';
    titleEl.textContent = ev.title;

    const metaEl = document.createElement('div');
    metaEl.className = 'event-list-meta';
    const parts = [];
    if (ev.time) parts.push(ev.time);
    if (ev.note) parts.push(ev.note);
    metaEl.textContent = parts.join('　');
    metaEl.style.display = parts.length ? 'block' : 'none';

    info.appendChild(titleEl);
    info.appendChild(metaEl);

    // attachment badge
    const hasImg  = ev.imageCount  > 0;
    const hasFile = ev.fileCount   > 0;
    if (hasImg || hasFile) {
      const badge = document.createElement('div');
      badge.className = 'event-attach-badge';
      if (hasImg)  badge.innerHTML += `🖼️ ${ev.imageCount}`;
      if (hasFile) badge.innerHTML += `${hasImg?' ':''}📎 ${ev.fileCount}`;
      info.appendChild(badge);
    }

    const editBtn = document.createElement('button');
    editBtn.className = 'event-edit-btn';
    editBtn.textContent = '詳細';
    editBtn.addEventListener('click', e => { e.stopPropagation(); openDetailSheet(ev); });

    item.appendChild(bar);
    item.appendChild(info);
    item.appendChild(editBtn);
    item.addEventListener('click', () => openDetailSheet(ev));
    list.appendChild(item);
  });

  document.getElementById('dayOverlay').classList.add('open');
}

function closeDaySheet() {
  document.getElementById('dayOverlay').classList.remove('open');
}

// =====================================================================
// DETAIL SHEET
// =====================================================================
async function openDetailSheet(ev) {
  closeDaySheet();
  const body = document.getElementById('detailBody');
  body.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>読み込み中…</div>';
  document.getElementById('detailSheetDate').textContent = formatDayLabel(selectedDate);
  document.getElementById('detailOverlay').classList.add('open');

  // Load attachments from IDB
  const attachments = await idbGetAll('attachments', 'eventId', ev.id);
  const images = attachments.filter(a => a.kind === 'image');
  const files  = attachments.filter(a => a.kind === 'file');

  body.innerHTML = '';

  // Header row (color bar + title)
  const headerRow = document.createElement('div');
  headerRow.className = 'detail-header-row';
  const colorBar = document.createElement('div');
  colorBar.className = 'detail-color-bar';
  colorBar.style.background = ev.color || COLORS[0];
  const titleEl = document.createElement('div');
  titleEl.className = 'detail-title';
  titleEl.textContent = ev.title;
  headerRow.appendChild(colorBar);
  headerRow.appendChild(titleEl);
  body.appendChild(headerRow);

  // Time
  if (ev.time) {
    const row = document.createElement('div');
    row.className = 'detail-meta-row';
    row.innerHTML = `<span class="detail-meta-icon">🕐</span>${ev.time}`;
    body.appendChild(row);
  }

  // Note
  if (ev.note) {
    const noteEl = document.createElement('div');
    noteEl.className = 'detail-note';
    noteEl.textContent = ev.note;
    body.appendChild(noteEl);
  }

  // Images
  if (images.length > 0) {
    const label = document.createElement('div');
    label.className = 'detail-section-label';
    label.textContent = `画像 (${images.length})`;
    body.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'img-grid';

    // Create blob URLs
    const blobUrls = [];
    images.forEach(att => {
      const blob = new Blob([att.data], { type: att.mime });
      const url  = URL.createObjectURL(blob);
      blobUrls.push(url);

      const img = document.createElement('img');
      img.className = 'img-thumb';
      img.src = url;
      img.alt = att.name;
      img.addEventListener('click', () => openLightbox(url));
      grid.appendChild(img);
    });

    body.appendChild(grid);

    // Revoke blob URLs when detail sheet closes
    document.getElementById('detailOverlay').addEventListener('transitionend', () => {
      blobUrls.forEach(u => URL.revokeObjectURL(u));
    }, { once: true });
  }

  // Files
  if (files.length > 0) {
    const label = document.createElement('div');
    label.className = 'detail-section-label';
    label.textContent = `ファイル (${files.length})`;
    body.appendChild(label);

    files.forEach(att => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `
        <span class="file-icon">${fileIcon(att.mime, att.name)}</span>
        <span class="file-name">${att.name}</span>
        <span class="file-size">${formatBytes(att.size)}</span>
      `;
      item.addEventListener('click', () => {
        const blob = new Blob([att.data], { type: att.mime });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = att.name;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
      });
      body.appendChild(item);
    });
  }

  // Edit button
  const editBtn = document.createElement('button');
  editBtn.className = 'detail-edit-btn';
  editBtn.textContent = '✏️　編集する';
  editBtn.addEventListener('click', () => {
    closeDetailSheet();
    openEventSheet(selectedDate, ev.id);
  });
  body.appendChild(editBtn);
}

function closeDetailSheet() {
  document.getElementById('detailOverlay').classList.remove('open');
}

// EVENT FORM SHEET
// =====================================================================
async function openEventSheet(d, evId = null) {
  selectedDate = d;
  editingId    = evId;
  pendingAdd    = [];
  pendingRemove = [];
  existingAttachments = [];

  if (evId) {
    const ev = (eventsMap[dateKey(d)] || []).find(e => e.id === evId);
    if (ev) {
      document.getElementById('fTitle').value = ev.title;
      document.getElementById('fTime').value  = ev.time || '';
      document.getElementById('fNote').value  = ev.note || '';
      selectedColor = ev.color || COLORS[0];
      document.getElementById('eventSheetTitle').textContent = '予定を編集';
      document.getElementById('deleteBtn').style.display = 'block';
    }
    // load existing attachments
    existingAttachments = await idbGetAll('attachments', 'eventId', evId);
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fTime').value  = '';
    document.getElementById('fNote').value  = '';
    selectedColor = COLORS[0];
    document.getElementById('eventSheetTitle').textContent = `${formatDayLabel(d)}に追加`;
    document.getElementById('deleteBtn').style.display = 'none';
  }

  renderColorGrid();
  renderPendingAttachments();
  document.getElementById('eventOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 320);
}

function closeEventSheet() {
  // revoke any pending preview URLs
  pendingAdd.forEach(p => { if (p.previewUrl) URL.revokeObjectURL(p.previewUrl); });
  pendingAdd    = [];
  pendingRemove = [];
  existingAttachments = [];
  document.getElementById('eventOverlay').classList.remove('open');
  editingId = null;
}

function renderColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selectedColor ? ' active' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => { selectedColor = c; renderColorGrid(); });
    grid.appendChild(sw);
  });
}

function renderPendingAttachments() {
  // existing images (not pending-removed)
  const imgWrap  = document.getElementById('pendingImages');
  const fileWrap = document.getElementById('pendingFiles');
  imgWrap.innerHTML  = '';
  fileWrap.innerHTML = '';

  // Existing attachments
  existingAttachments.forEach(att => {
    if (pendingRemove.includes(att.id)) return;

    if (att.kind === 'image') {
      const blob = new Blob([att.data], { type: att.mime });
      const url  = URL.createObjectURL(blob);
      const wrap = document.createElement('div');
      wrap.className = 'pending-img-wrap';
      const img = document.createElement('img');
      img.className = 'pending-img'; img.src = url; img.alt = att.name;
      const rm = document.createElement('button');
      rm.className = 'pending-remove'; rm.textContent = '×';
      rm.addEventListener('click', () => {
        pendingRemove.push(att.id);
        URL.revokeObjectURL(url);
        renderPendingAttachments();
      });
      wrap.appendChild(img); wrap.appendChild(rm);
      imgWrap.appendChild(wrap);
    } else {
      const row = document.createElement('div');
      row.className = 'pending-file';
      row.innerHTML = `<span>${fileIcon(att.mime, att.name)}</span>
        <span class="pending-file-name">${att.name}</span>
        <span style="font-size:11px;color:var(--sub)">${formatBytes(att.size)}</span>`;
      const rm = document.createElement('button');
      rm.className = 'pending-file-remove'; rm.textContent = '×';
      rm.addEventListener('click', () => {
        pendingRemove.push(att.id);
        renderPendingAttachments();
      });
      row.appendChild(rm);
      fileWrap.appendChild(row);
    }
  });

  // New pending items
  pendingAdd.forEach(p => {
    if (p.kind === 'image') {
      const wrap = document.createElement('div');
      wrap.className = 'pending-img-wrap';
      const img = document.createElement('img');
      img.className = 'pending-img'; img.src = p.previewUrl; img.alt = p.file.name;
      const rm = document.createElement('button');
      rm.className = 'pending-remove'; rm.textContent = '×';
      rm.addEventListener('click', () => {
        URL.revokeObjectURL(p.previewUrl);
        pendingAdd = pendingAdd.filter(x => x.tempId !== p.tempId);
        renderPendingAttachments();
      });
      wrap.appendChild(img); wrap.appendChild(rm);
      imgWrap.appendChild(wrap);
    } else {
      const row = document.createElement('div');
      row.className = 'pending-file';
      row.innerHTML = `<span>${fileIcon(p.file.type, p.file.name)}</span>
        <span class="pending-file-name">${p.file.name}</span>
        <span style="font-size:11px;color:var(--sub)">${formatBytes(p.file.size)}</span>`;
      const rm = document.createElement('button');
      rm.className = 'pending-file-remove'; rm.textContent = '×';
      rm.addEventListener('click', () => {
        pendingAdd = pendingAdd.filter(x => x.tempId !== p.tempId);
        renderPendingAttachments();
      });
      row.appendChild(rm);
      fileWrap.appendChild(row);
    }
  });
}

// =====================================================================
// SAVE EVENT
// =====================================================================
async function saveEvent() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) {
    const inp = document.getElementById('fTitle');
    inp.focus(); inp.style.borderColor = '#e53935';
    setTimeout(() => inp.style.borderColor = '', 1500);
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中…';

  try {
    const key = dateKey(selectedDate);
    const evId = editingId || uid();

    // Count attachments after changes
    const existImg  = existingAttachments.filter(a => a.kind === 'image' && !pendingRemove.includes(a.id));
    const existFile = existingAttachments.filter(a => a.kind === 'file'  && !pendingRemove.includes(a.id));
    const newImg    = pendingAdd.filter(p => p.kind === 'image');
    const newFile   = pendingAdd.filter(p => p.kind === 'file');
    const imageCount = existImg.length  + newImg.length;
    const fileCount  = existFile.length + newFile.length;

    // Save event record
    const evRecord = {
      id: evId, dateKey: key,
      title,
      time:  document.getElementById('fTime').value,
      note:  document.getElementById('fNote').value.trim(),
      color: selectedColor,
      imageCount, fileCount,
    };
    await idbPut('events', evRecord);

    // Delete removed attachments
    for (const aid of pendingRemove) {
      await idbDelete('attachments', aid);
    }

    // Save new attachments
    for (const p of pendingAdd) {
      const buf = await p.file.arrayBuffer();
      await idbPut('attachments', {
        id: uid(), eventId: evId,
        kind: p.kind, name: p.file.name,
        mime: p.file.type, size: p.file.size,
        data: buf,
      });
    }

    await loadEventsMap();
    renderCalendar();
    closeEventSheet();
  } catch(err) {
    console.error(err);
    alert('保存に失敗しました: ' + err.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存する';
  }
}

// =====================================================================
// DELETE EVENT
// =====================================================================
async function deleteEvent() {
  if (!editingId) return;
  if (!confirm('この予定を削除しますか？')) return;

  try {
    // Delete all attachments for this event
    const atts = await idbGetAll('attachments', 'eventId', editingId);
    for (const a of atts) await idbDelete('attachments', a.id);
    await idbDelete('events', editingId);

    await loadEventsMap();
    renderCalendar();
    closeEventSheet();
  } catch(err) {
    console.error(err);
    alert('削除に失敗しました: ' + err.message);
  }
}

document.getElementById('detailSheetClose').addEventListener('click', () => {
  closeDetailSheet();
  openDaySheet(selectedDate);
});
document.getElementById('detailOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('detailOverlay')) {
    closeDetailSheet();
    openDaySheet(selectedDate);
  }
});

document.getElementById('eventSheetClose').addEventListener('click', () => {
  closeEventSheet();
  if (selectedDate) openDaySheet(selectedDate);
});
document.getElementById('eventOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('eventOverlay')) {
    closeEventSheet();
    if (selectedDate) openDaySheet(selectedDate);
  }
});

document.getElementById('saveBtn').addEventListener('click', saveEvent);
document.getElementById('deleteBtn').addEventListener('click', deleteEvent);
document.getElementById('fTitle').addEventListener('keydown', e => { if (e.key === 'Enter') saveEvent(); });

// Swipe down to close
(function() {
  const sheets = [
    { id: 'daySheet',    close: () => closeDaySheet() },
    { id: 'detailSheet', close: () => { closeDetailSheet(); openDaySheet(selectedDate); } },
    { id: 'eventSheet',  close: () => { closeEventSheet(); if (selectedDate) openDaySheet(selectedDate); } },
  ];
  sheets.forEach(({ id, close }) => {
    let startY = 0;
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
    el.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - startY > 80) close();
    }, { passive: true });
  });
})();
